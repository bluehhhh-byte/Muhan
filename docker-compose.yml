services:
  muhan-web:
    build:
      context: .
      args:
        MUHAN_REPO: ${MUHAN_REPO:-https://github.com/comfuture/muhan.git}
        MUHAN_REF: ${MUHAN_REF:-master}
    image: muhan-web-runner:local
    platform: linux/amd64
    environment:
      MUHAN_HOME: /opt/muhan
      MUHAN_HOST: 127.0.0.1
      MUHAN_PORT: ${MUHAN_PORT:-4102}
      MUHAN_LOG: /tmp/muhan-frp.log
      MUHAN_LOG_TO_STDOUT: ${MUHAN_LOG_TO_STDOUT:-1}
      MUHAN_START_TIMEOUT_MS: ${MUHAN_START_TIMEOUT_MS:-40000}
      WEB_HOST: 0.0.0.0
      WEB_PORT: 8080
      ACCESS_TOKEN: ${ACCESS_TOKEN:-}
      IDLE_TIMEOUT_MS: ${IDLE_TIMEOUT_MS:-1800000}
      TCP_CONNECT_TIMEOUT_MS: ${TCP_CONNECT_TIMEOUT_MS:-5000}
      MAX_CLIENTS: ${MAX_CLIENTS:-20}
      TELNET_FILTER: ${TELNET_FILTER:-1}
      HEALTHCHECK_TARGET: ${HEALTHCHECK_TARGET:-0}
    ports:
      - "${WEB_PORT:-8080}:8080"
    restart: unless-stopped
