<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>무한대전</title>
    <meta name="app-version" content="0.27.0" />
    <meta http-equiv="cache-control" content="no-store" />
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <link rel="stylesheet" href="/styles.css?v=0.27.0-novel-frontier" />
  </head>
  <body>
    <main class="terminal-shell" data-ui-version="0.27.0">
      <header class="top-line">
        <span>MUHAN IDLE OPS 01410</span>
        <span id="status">상태 확인 중</span>
      </header>

      <section class="intro" aria-label="무한대전 접속 화면">
        <p>하이텔 게임방 &gt; 온라인게임 &gt; 무한대전</p>
        <h1>무한대전</h1>
        <p>N E K O &nbsp; A U T O &nbsp; P I L O T</p>
      </section>

      <section class="notice" aria-label="접속 상태">
        <pre id="diagnostics">상태 점검 대기 중...</pre>
      </section>

      <section class="menu" aria-label="메뉴">
        <button id="gameConnect" type="button">1. 입장</button>
        <button id="gameDisconnect" type="button" disabled>2. 퇴장</button>
        <button id="gameEnter" type="button" disabled>3. 네코</button>
        <button id="gameClear" type="button">4. 화면 지우기</button>
        <button id="gameAuto" type="button" disabled>5. 자동 진행 켜기</button>
        <select id="autoMode" aria-label="자동 진행 목표">
          <option value="story">스토리 우선</option>
          <option value="hunt">사냥 우선</option>
          <option value="gear">장비 우선</option>
          <option value="safe">안전 우선</option>
          <option value="explore">탐험 우선</option>
          <option value="frontier">무한평원</option>
          <option value="team">팀 우선</option>
        </select>
      </section>

      <details class="settings">
        <summary>네코 AI 설정 / 기억</summary>
        <div class="settings-grid">
          <label>모델 <input id="geminiModel" type="text" value="gemini-3.1-flash-lite" /></label>
          <label>네코 성별 <input id="nekoGender" type="text" placeholder="검은 고양이 / 여성 / 남성 / 중성" /></label>
          <label>말투 <input id="nekoTone" type="text" placeholder="상냥함, 장난스러움, 무협풍..." /></label>
          <label>성격
            <select id="nekoPersonality">
              <option value="차분한 분석가">차분한 분석가</option>
              <option value="장난스러운 동료">장난스러운 동료</option>
              <option value="냉정한 전술가">냉정한 전술가</option>
              <option value="다정한 보호자">다정한 보호자</option>
            </select>
          </label>
          <label>역할
            <select id="nekoRole">
              <option value="길잡이">길잡이</option>
              <option value="전술가">전술가</option>
              <option value="수호자">수호자</option>
              <option value="치유사">치유사</option>
              <option value="상인">상인</option>
            </select>
          </label>
          <label>위험 성향
            <select id="nekoRisk">
              <option value="균형">균형</option>
              <option value="안전">안전</option>
              <option value="공격">공격</option>
            </select>
          </label>
          <label>학습 방식
            <select id="nekoMemoryMode">
              <option value="요약 기억">요약 기억</option>
              <option value="전투 우선">전투 우선</option>
              <option value="탐험 우선">탐험 우선</option>
              <option value="대화 우선">대화 우선</option>
            </select>
          </label>
          <label>레벨 <input id="nekoLevel" type="number" min="1" max="99" /></label>
          <label>행운 <input id="nekoLuck" type="number" min="0" max="99" /></label>
          <label>특수능력 <input id="nekoAbility" type="text" placeholder="길찾기, 예언, 전투 보조..." /></label>
          <label class="settings-wide">네코 프롬프트 <textarea id="nekoPrompt" rows="4" placeholder="무한대전 세계관 안에서 네코가 어떻게 말하고 행동할지 입력"></textarea></label>
          <div class="settings-actions">
            <button id="saveSettings" type="button">저장</button>
            <button id="randomSettings" type="button">랜덤 생성</button>
            <button id="testGemini" type="button">Gemini 확인</button>
            <span id="geminiTestStatus" class="settings-status" aria-live="polite">확인 대기</span>
          </div>
        </div>
      </details>

      <section class="play-area" aria-label="게임 진행">
        <aside class="status-panel" aria-label="캐릭터 정보">
          <pre id="statusPanel">캐릭터 정보 대기 중...</pre>
        </aside>
        <div id="gameScreen" class="terminal" role="log" aria-label="게임 화면"></div>
      </section>

      <form id="gameForm" class="commandbar" autocomplete="off">
        <label for="gameCommand">선택&gt;</label>
        <input id="gameCommand" type="text" placeholder="네코에게 묻거나 명령어 입력" disabled />
        <button id="gameSend" type="submit" disabled>전송</button>
      </form>

      <input id="autoScroll" type="checkbox" checked hidden />
    </main>

    <script src="/app.js?v=0.27.0-novel-frontier"></script>
  </body>
</html>
