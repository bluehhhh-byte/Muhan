<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>무한대전</title>
    <meta name="app-version" content="0.8.0" />
    <meta http-equiv="cache-control" content="no-store" />
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <link rel="stylesheet" href="/styles.css?v=0.8.0-neko" />
  </head>
  <body>
    <main class="terminal-shell" data-ui-version="0.8.0">
      <header class="top-line">
        <span>MUHAN NET 01410</span>
        <span id="status">상태 확인 중</span>
      </header>

      <section class="intro" aria-label="무한대전 접속 화면">
        <p>하이텔 게임방 &gt; 온라인게임 &gt; 무한대전</p>
        <h1>무한대전</h1>
        <p>M U H A N &nbsp; D A E J E O N</p>
      </section>

      <section class="notice" aria-label="접속 상태">
        <pre id="diagnostics">상태 점검 대기 중...</pre>
      </section>

      <section class="menu" aria-label="메뉴">
        <button id="gameConnect" type="button">1. 입장</button>
        <button id="gameDisconnect" type="button" disabled>2. 퇴장</button>
        <button id="gameEnter" type="button" disabled>3. 네코</button>
        <button id="gameClear" type="button">4. 화면 지우기</button>
        <button id="checkStatus" type="button">5. 상태 확인</button>
      </section>

      <pre id="gameScreen" class="terminal" aria-label="게임 화면"></pre>

      <form id="gameForm" class="commandbar" autocomplete="off">
        <label for="gameCommand">선택&gt;</label>
        <input id="gameCommand" type="text" placeholder="네코에게 묻거나 명령어 입력" disabled />
        <button id="gameSend" type="submit" disabled>전송</button>
      </form>

      <input id="autoScroll" type="checkbox" checked hidden />
    </main>

    <script src="/app.js?v=0.8.0-neko"></script>
  </body>
</html>
