<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>무한대전 Web Runner</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>무한대전 Web Runner</h1>
        <p>브라우저에서 MUHAN 레거시 MUD 서버에 접속합니다.</p>
      </div>
      <div class="status" id="status">연결 안 됨</div>
    </header>

    <main class="layout">
      <section class="panel controls" aria-label="접속 설정">
        <label>
          접속 토큰
          <input id="token" type="password" autocomplete="off" placeholder="ACCESS_TOKEN 설정 시 입력" />
        </label>

        <div class="buttons">
          <button id="connect" type="button">접속</button>
          <button id="disconnect" type="button" disabled>끊기</button>
          <button id="clear" type="button">화면 지우기</button>
        </div>

        <label class="checkbox">
          <input id="stripAnsi" type="checkbox" checked />
          ANSI 제어문자 숨김
        </label>

        <label class="checkbox">
          <input id="autoScroll" type="checkbox" checked />
          자동 스크롤
        </label>
      </section>

      <section class="terminal-wrap" aria-label="게임 화면">
        <pre id="screen" class="terminal" aria-live="polite"></pre>
      </section>

      <form id="commandForm" class="commandbar" autocomplete="off">
        <input id="command" type="text" placeholder="명령어를 입력하고 Enter" spellcheck="false" disabled />
        <button id="send" type="submit" disabled>전송</button>
      </form>
    </main>

    <footer>
      <span>Tip: ↑/↓ 명령어 히스토리, Ctrl+L 화면 지우기</span>
    </footer>

    <script src="/app.js"></script>
  </body>
</html>
